services:
  # ── Support services ─────────────────────────────────────────────────────────
  # Creatrix and Ollama run directly on the host (npm start / ollama serve).
  # This compose file manages only the backing services they depend on.
  # Start with: docker compose up -d

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: creatrix
      POSTGRES_USER: creatrix
      POSTGRES_PASSWORD: password
    ports:
      # Exposed so Creatrix running on the host can connect via localhost:5432
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creatrix"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
