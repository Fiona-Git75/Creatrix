services:
  # ── LEGACY: Docker backing services ───────────────────────────────────────────
  # The preferred setup is now native installation — run each service directly
  # on the host without Docker.  Docker's container health-checks only confirm
  # that the container is managed; they cannot guarantee the service inside is
  # accepting connections.  Creatrix's own coherence probes (SELECT 1,
  # GET /search?format=json, GET /v1/models) are the authoritative readiness
  # check — they run regardless of how the service was started.
  #
  # Native equivalents:
  #   PostgreSQL:  sudo systemctl start postgresql
  #   SearXNG:     sudo systemctl start searxng   (or python searx/webapp.py)
  #   Whisper:     faster-whisper-server --model base --host 0.0.0.0 --port 9000
  #
  # If you still want to use Docker for one or more services:
  #   docker compose up -d                                  # Postgres only
  #   docker compose --profile search up -d                 # + SearXNG
  #   docker compose --profile media up -d                  # + Whisper
  #
  # After starting, configure endpoints in Creatrix Settings:
  #   Search endpoint:  http://localhost:8080
  #   Whisper endpoint: http://localhost:9000
  #
  # OCR (tesseract.js) runs inside Creatrix — no container needed.

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: creatrix
      POSTGRES_USER: creatrix
      POSTGRES_PASSWORD: password
    ports:
      # Exposed so Creatrix running on the host can connect via localhost:5432
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creatrix"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Optional: Web search ───────────────────────────────────────────────────────
  # Privacy-respecting meta-search engine.
  # Creatrix falls back to DuckDuckGo if this isn't running.
  # Set Search endpoint in Settings → http://localhost:8080
  searxng:
    image: searxng/searxng:latest
    profiles: [search]
    ports:
      - "8080:8080"
    volumes:
      # settings.yml enables JSON format (required for Creatrix API calls)
      - ./docker/searxng:/etc/searxng
    environment:
      SEARXNG_BASE_URL: "http://localhost:8080/"
    restart: unless-stopped

  # ── Optional: Transcription ────────────────────────────────────────────────────
  # Local Whisper server with OpenAI-compatible API.
  # Set Whisper endpoint in Settings → http://localhost:9000/v1
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:cpu-latest
    profiles: [media]
    ports:
      - "9000:9000"
    environment:
      ASR_MODEL: base        # tiny | base | small | medium | large
      ASR_ENGINE: openai_whisper
    restart: unless-stopped

volumes:
  pgdata:
